<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUBSTITUA: Nome do Produto</title>
<style>
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #fff; color: #111; }

  .topbar{
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    font-weight: 800;
    font-size: 18px;
  }

  .content{ max-width: 480px; margin: 0 auto; padding: 16px; }

  .product-img{
    width: 100%;
    height: 320px;
    object-fit: contain;
    background: #f7f7f7;
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .title{ font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .subtitle{ font-size: 14px; color: #666; margin-bottom: 16px; }

  .price-row{ display: flex; align-items: baseline; gap: 10px; margin-bottom: 24px; }
  .price{ font-size: 32px; font-weight: 800; }
  .old-price{ color: #999; text-decoration: line-through; font-size: 15px; }

  .cta-btn{
    display: block;
    width: 100%;
    height: 52px;
    border-radius: 999px;
    border: 0;
    background: #178a3b;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    text-align: center;
    line-height: 52px;
    text-decoration: none;
    cursor: pointer;
  }
  .cta-btn:active{ opacity: .9; }
</style>
</head>
<body>

<div class="topbar">SUBSTITUA: Sua Marca</div>

<div class="content">
  <!-- SUBSTITUA: caminho da imagem do produto -->
  <img class="product-img" src="images/produto.png" alt="SUBSTITUA: nome do produto">

  <h1 class="title">SUBSTITUA: Título do Produto</h1>
  <p class="subtitle">SUBSTITUA: descrição curta do produto</p>

  <div class="price-row">
    <span class="price">R$ 0,00</span>
    <span class="old-price">R$ 0,00</span>
  </div>

  <!-- Este botão leva para a página de preenchimento de dados -->
  <a class="cta-btn" href="/oferta1/dados.html">Continuar</a>
</div>

</body>
</html>
