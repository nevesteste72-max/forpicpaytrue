<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preencher Dados de Entrega</title>
<style>
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #fff; color: #111; }

  .topbar{ padding: 14px 16px; border-bottom: 1px solid #eee; font-weight: 800; font-size: 18px; }
  .content{ max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }
  .page-title{ font-size: 22px; font-weight: 800; margin-bottom: 20px; }

  .field{ margin-bottom: 16px; }
  .field-label{ display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 4px; }
  .field-input{
    width: 100%;
    height: 42px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 0 12px;
    font-size: 15px;
    font-family: inherit;
  }

  .submit-btn{
    width: 100%;
    height: 52px;
    border-radius: 999px;
    border: 0;
    background: #178a3b;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    margin-top: 12px;
  }
  .submit-btn:active{ opacity: .9; }
</style>
</head>
<body>

<div class="topbar">SUBSTITUA: Sua Marca</div>

<div class="content">
  <h1 class="page-title">Dados de Entrega</h1>

  <form id="dadosForm" autocomplete="on">
    <div class="field">
      <label class="field-label" for="nome">Nome Completo</label>
      <input class="field-input" type="text" id="nome" name="nome" autocomplete="name" required>
    </div>

    <div class="field">
      <label class="field-label" for="telefone">Telefone</label>
      <input class="field-input" type="tel" id="telefone" name="telefone" autocomplete="tel" required>
    </div>

    <div class="field">
      <label class="field-label" for="endereco">Endereço</label>
      <input class="field-input" type="text" id="endereco" name="endereco" autocomplete="street-address" required>
    </div>

    <!-- Este botão sai da sua página e vai direto para o checkout real do produto -->
    <button class="submit-btn" type="submit">Finalizar e Pagar</button>
  </form>
</div>

<script>
  // SUBSTITUA: coloque aqui o link "Copiar" do seu produto no Dashboard
  // (Dashboard > card do produto > botão "Copiar" -> cola o link aqui)
  const CHECKOUT_URL = "https://www.tecnhogar.store/pay/SUBSTITUA-PELO-ID-DO-PRODUTO";

  document.getElementById("dadosForm").addEventListener("submit", function (e) {
    e.preventDefault();
    window.location.href = CHECKOUT_URL;
  });
</script>

</body>
</html>
